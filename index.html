<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel de Simuladores · Sistemas Operativos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0e1117;
    --panel: #161b25;
    --panel-hover: #1c2230;
    --border: #262d3d;
    --text: #e6e9f0;
    --muted: #8b93a7;
    --mem: #4fd1c5;      /* gestión de memoria */
    --mem-dim: rgba(79,209,197,0.12);
    --cpu: #f6ad55;      /* planificación de CPU */
    --cpu-dim: rgba(246,173,85,0.12);
    --danger: #f56565;
    --ok: #48bb78;
    --mono: 'IBM Plex Mono', 'Consolas', monospace;
    --sans: 'Inter', 'Segoe UI', sans-serif;
  }

  *{ margin:0; padding:0; box-sizing:border-box; }

  html, body{ height:100%; }

  body{
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    display:flex;
    flex-direction:column;
    min-height:100vh;
  }

  /* ---------- Topbar ---------- */
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:16px;
    padding:14px 22px;
    background: var(--panel);
    border-bottom:1px solid var(--border);
  }

  .brand{
    display:flex;
    align-items:center;
    gap:12px;
  }

  .brand-mark{
    width:34px; height:34px;
    border-radius:8px;
    background: linear-gradient(135deg, var(--mem), var(--cpu));
    display:flex; align-items:center; justify-content:center;
    font-family: var(--mono);
    font-weight:700;
    font-size:13px;
    color:#0e1117;
    flex-shrink:0;
  }

  .brand-text h1{
    font-size:15px;
    font-weight:600;
    letter-spacing:0.2px;
  }

  .brand-text p{
    font-family: var(--mono);
    font-size:11px;
    color: var(--muted);
    margin-top:2px;
  }

  .status-readout{
    display:flex;
    gap:18px;
    font-family: var(--mono);
    font-size:11px;
    color: var(--muted);
  }

  .status-readout strong{
    color: var(--text);
    font-weight:600;
  }

  .dot{
    display:inline-block;
    width:7px; height:7px;
    border-radius:50%;
    background: var(--ok);
    margin-right:6px;
    box-shadow: 0 0 6px var(--ok);
  }

  /* ---------- Layout ---------- */
  .shell{
    display:flex;
    flex:1;
    min-height:0;
  }

  /* ---------- Sidebar ---------- */
  .sidebar{
    width:270px;
    flex-shrink:0;
    background: var(--panel);
    border-right:1px solid var(--border);
    padding:20px 14px;
    overflow-y:auto;
  }

  .group-label{
    font-family: var(--mono);
    font-size:10.5px;
    letter-spacing:1.2px;
    text-transform:uppercase;
    color: var(--muted);
    padding:0 8px;
    margin:18px 0 8px;
  }

  .group-label:first-child{ margin-top:0; }

  .proc-row{
    display:flex;
    align-items:center;
    gap:10px;
    width:100%;
    padding:10px 10px;
    border-radius:8px;
    border:1px solid transparent;
    background:transparent;
    color: var(--text);
    text-align:left;
    cursor:pointer;
    font-family: var(--sans);
    transition: background .15s, border-color .15s;
  }

  .proc-row:hover{
    background: var(--panel-hover);
  }

  .proc-row.active{
    background: var(--panel-hover);
    border-color: var(--border);
  }

  .proc-row.active.mem{ border-left:3px solid var(--mem); }
  .proc-row.active.cpu{ border-left:3px solid var(--cpu); }

  .pid{
    font-family: var(--mono);
    font-size:10.5px;
    font-weight:600;
    padding:3px 6px;
    border-radius:5px;
    flex-shrink:0;
  }

  .pid.mem{ color: var(--mem); background: var(--mem-dim); }
  .pid.cpu{ color: var(--cpu); background: var(--cpu-dim); }

  .proc-meta{ min-width:0; }

  .proc-name{
    font-size:13px;
    font-weight:600;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }

  .proc-sub{
    font-size:11px;
    color: var(--muted);
    margin-top:1px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }

  .sidebar-footer{
    margin-top:24px;
    padding:12px 10px;
    border-top:1px solid var(--border);
    font-family: var(--mono);
    font-size:10.5px;
    color: var(--muted);
    line-height:1.6;
  }

  /* ---------- Main ---------- */
  .main{
    flex:1;
    display:flex;
    flex-direction:column;
    min-width:0;
  }

  .view-header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:14px 24px;
    border-bottom:1px solid var(--border);
    background: #10141d;
  }

  .breadcrumb{
    font-family: var(--mono);
    font-size:12px;
    color: var(--muted);
  }

  .breadcrumb strong{
    color: var(--text);
  }

  .view-tag{
    font-family: var(--mono);
    font-size:10.5px;
    padding:4px 9px;
    border-radius:5px;
    letter-spacing:0.5px;
  }

  .view-tag.mem{ color: var(--mem); background: var(--mem-dim); }
  .view-tag.cpu{ color: var(--cpu); background: var(--cpu-dim); }

  .frame-wrap{
    flex:1;
    min-height:0;
    background:#fff;
  }

  iframe{
    width:100%;
    height:100%;
    border:none;
    display:block;
  }

  /* ---------- Responsive ---------- */
  @media (max-width: 860px){
    .shell{ flex-direction:column; }
    .sidebar{
      width:100%;
      border-right:none;
      border-bottom:1px solid var(--border);
      padding:12px;
    }
    .status-readout{ display:none; }
    .frame-wrap{ height:75vh; }
  }
</style>
</head>
<body>

  <header class="topbar">
    <div class="brand">
      <div class="brand-mark">SO</div>
      <div class="brand-text">
        <h1>Panel de Simuladores</h1>
        <p>Sistemas Operativos · Memoria &amp; Planificación</p>
      </div>
    </div>
    <div class="status-readout">
      <span><span class="dot"></span><strong>4</strong> algoritmos cargados</span>
      <span>modo: <strong>independiente</strong></span>

  <div class="shell">
    <nav class="sidebar" id="sidebar">
      <div class="group-label">Gestión de memoria</div>

          <div class="proc-sub">First In, First Out</div>

          <div class="proc-sub">Least Frequently Used</div>

      <div class="group-label">Planificación de CPU</div>

        <span class="proc-meta">
          <div class="proc-name">Prioridad</div>
          <div class="proc-sub">No expropiativo</div>
        </span>
      </button>

      <button class="proc-row cpu" data-key="roundrobin" data-group="cpu" data-label="Planificación de procesos">
        <span class="pid cpu">P04</span>
        <span class="proc-meta">
          <div class="proc-name">Round Robin</div>
          <div class="proc-sub">Por quantum</div>
        </span>
      </button>

      <div class="sidebar-footer">
        Cada simulador corre de forma aislada<br>
        (iframe independiente).<br>
        Selecciona uno para comenzar.
      </div>
    </nav>

    <main class="main">
      <div class="view-header">

        <div class="view-tag" id="viewTag" style="visibility:hidden;">—</div>
      </div>
      <div class="frame-wrap">
        <iframe id="simFrame" title="Simulador"></iframe>
      </div>
    </main>
  </div>

    function b64ToUtf8(b64){
      const binary = atob(b64);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
      return new TextDecoder('utf-8').decode(bytes);
    }

    const rows = document.querySelectorAll('.proc-row');
    const frame = document.getElementById('simFrame');
    const currentLabel = document.getElementById('currentLabel');
    const viewTag = document.getElementById('viewTag');

    const groupNames = { mem: 'Gestión de memoria', cpu: 'Planificación de CPU' };

    function activate(row, updateHash = true){
      rows.forEach(r => r.classList.remove('active'));
      row.classList.add('active');

      const key = row.dataset.key;
      frame.srcdoc = b64ToUtf8(SIMS[key]);

      const name = row.querySelector('.proc-name').textContent;
      currentLabel.textContent = name;

      const group = row.dataset.group;
      viewTag.textContent = groupNames[group];
      viewTag.className = 'view-tag ' + group;
      viewTag.style.visibility = 'visible';

      if (updateHash){
        history.replaceState(null, '', '#' + key);
      }
    }

    rows.forEach(row => {
      row.addEventListener('click', () => activate(row));
    });

    function loadFromHash(){
      const key = location.hash.replace('#', '');
      let target = null;
      if (key){
        target = [...rows].find(r => r.dataset.key === key);
      }
      activate(target || rows[0], false);
    }

    window.addEventListener('DOMContentLoaded', loadFromHash);
    window.addEventListener('hashchange', loadFromHash);
</script>
